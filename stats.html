<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>菁菁物件點擊統計</title>
    <link rel="stylesheet" href="./stats.css?v=20260705-3" />
    <script defer src="./stats.js?v=20260705-3"></script>
  </head>
  <body>
    <main class="stats-shell">
      <header class="stats-header">
        <div>
          <span class="stats-pill">菁菁後台</span>
          <h1>客戶物件點擊統計</h1>
          <p>查看客戶看了哪些物件、喜歡哪些物件，以及電話與 LINE 的點擊情況。</p>
        </div>
        <div class="stats-actions" id="statsActions">
          <button id="refreshButton" type="button">重新整理</button>
        </div>
      </header>

      <p class="load-message" id="loadMessage" role="status">讀取統計中...</p>

      <section id="dashboard" class="dashboard" hidden>
        <section class="summary-grid" id="summaryGrid" aria-label="總覽"></section>

        <section class="stats-section">
          <div class="section-heading">
            <span>Property Ranking</span>
            <h2>物件互動排行</h2>
          </div>
          <div id="propertyList" class="property-list"></div>
        </section>

        <section class="stats-section">
          <div class="section-heading">
            <span>Customers</span>
            <h2>客戶互動紀錄</h2>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>客戶</th>
                  <th>開啟</th>
                  <th>看物件</th>
                  <th>喜歡</th>
                  <th>電話</th>
                  <th>LINE</th>
                  <th>最近互動</th>
                </tr>
              </thead>
              <tbody id="customerRows"></tbody>
            </table>
          </div>
        </section>

        <section class="stats-section">
          <div class="section-heading">
            <span>Recent</span>
            <h2>最近事件</h2>
          </div>
          <div id="recentList" class="recent-list"></div>
        </section>
      </section>
    </main>
  </body>
</html>
